name: package

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tooling
        run: python -m pip install build
      - name: Run release safety check
        run: python scripts/check_release.py
      - name: Build sdist and wheel
        run: python -m build --sdist --wheel
      - name: Install wheel
        run: python -m pip install --force-reinstall --no-deps dist/*.whl
      - name: Smoke-test installed CLI
        run: rhodyn validate examples/synthetic_trajectory.csv
      - name: Install source distribution
        run: python -m pip install --force-reinstall --no-deps dist/*.tar.gz
      - name: Run tests
        run: python -m unittest discover tests
